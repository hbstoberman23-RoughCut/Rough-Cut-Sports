<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Diamond Director Test</title>
<meta name="theme-color" content="#ed7a00">
<style>
body{margin:0;background:#090909;color:#fff;font-family:Arial,sans-serif;padding:20px}
.card{max-width:620px;margin:auto;background:#171717;border:1px solid #444;border-radius:14px;padding:18px}
h1{margin-top:0}
label{display:block;color:#bbb;margin:12px 0 5px}
input,select{width:100%;box-sizing:border-box;padding:12px;border-radius:8px;border:1px solid #555;background:#0e0e0e;color:#fff;font-size:16px}
button{margin-top:16px;padding:13px 18px;border:0;border-radius:8px;background:#ed7a00;color:#fff;font-weight:800;font-size:16px}
.event{margin-top:12px;padding:12px;border:1px solid #555;border-radius:8px;background:#222}
#message{margin-top:12px;color:#ffad5a;font-weight:700}
</style>
</head>
<body>
<div class="card">
<h1>Diamond Director</h1>
<p>Clean event-creation test</p>

<label for="name">Event Name</label>
<input id="name" value="3rd Annual Labor Day Tournament">

<label for="sport">Sport</label>
<select id="sport">
<option value="Slowpitch">Slowpitch</option>
<option value="Fastpitch">Fastpitch</option>
<option value="Baseball">Baseball</option>
</select>

<label for="date">Date</label>
<input id="date" type="date" value="2026-09-05">

<label for="location">Location</label>
<input id="location" value="Edinburg Fields">

<button id="createButton" type="button">Create Event</button>
<div id="message"></div>

<h2>My Events</h2>
<div id="events"></div>
</div>

<script>
(function(){
  "use strict";

  var STORAGE_KEY = "diamondDirectorCleanTest";
  var events = [];

  function load(){
    try{
      var saved = localStorage.getItem(STORAGE_KEY);
      events = saved ? JSON.parse(saved) : [];
      if(!Array.isArray(events)) events = [];
    }catch(error){
      events = [];
      document.getElementById("message").textContent = "Storage could not be read.";
    }
  }

  function save(){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(events));
  }

  function render(){
    var box = document.getElementById("events");
    if(events.length === 0){
      box.innerHTML = "<p>No events yet.</p>";
      return;
    }
    box.innerHTML = events.map(function(event){
      return '<div class="event"><strong>' + escapeHtml(event.name) + '</strong><br>' +
        escapeHtml(event.sport) + ' • ' + escapeHtml(event.date) + ' • ' +
        escapeHtml(event.location) + '</div>';
    }).join("");
  }

  function escapeHtml(value){
    return String(value || "")
      .replace(/&/g,"&amp;")
      .replace(/</g,"&lt;")
      .replace(/>/g,"&gt;")
      .replace(/"/g,"&quot;")
      .replace(/'/g,"&#039;");
  }

  document.getElementById("createButton").addEventListener("click", function(){
    var name = document.getElementById("name").value.trim();
    var sport = document.getElementById("sport").value;
    var date = document.getElementById("date").value;
    var location = document.getElementById("location").value.trim();
    var message = document.getElementById("message");

    if(!name){
      message.textContent = "Enter an event name.";
      return;
    }

    try{
      events.push({
        id: "event-" + Date.now() + "-" + Math.floor(Math.random()*1000000),
        name: name,
        sport: sport,
        date: date,
        location: location
      });
      save();
      render();
      message.textContent = "Event created successfully.";
    }catch(error){
      message.textContent = "Create failed: " + error.message;
    }
  });

  load();
  render();
})();
</script>
</body>
</html>
